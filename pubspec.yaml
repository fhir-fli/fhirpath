name: fhirpath
description: >-
  Model-independent FHIRPath engine — a Dart port of the Java reference.
  Navigates any FHIR version through the FhirNode contract; bindings are
  fhir_r4/r5/r6_path.
version: 0.6.0
homepage: https://www.fhirfli.dev/
repository: https://github.com/fhir-fli/fhirpath

topics:
  - fhir
  - fhirpath
  - hl7
  - healthcare
  - interoperability

environment:
  sdk: ^3.5.0

# Model-independent core: NO fhir_r* dependency. FHIR is supplied at runtime
# through the IWorkerContext / IFhirValueFactory interfaces, implemented in
# the separate fhir_r4_path / fhir_r5_path / fhir_r6_path binding packages.
dependencies:
  collection: ^1.19.1
  fhir_node: ^0.6.0
  # 0.9.0 minimum: earlier ucum exported a conflicting Utilities symbol and
  # had incorrect affine temperature conversions.
  ucum: ^0.9.0

dev_dependencies:
  test: ^1.29.0
  very_good_analysis: ^10.0.0
